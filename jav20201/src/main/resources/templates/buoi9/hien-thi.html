<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    Thong tin san pham:
    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Ten</th>
            <th>Gia</th>
            <th>Con bao hanh</th>
            <th>Danh muc</th>
            <th>Hanh dong</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="sp : ${listSanPham}">
            <tr>
                <td th:text="${sp.id}"></td>
                <td th:text="${sp.ten}"></td>
                <td th:text="${sp.gia}"></td>
                <td th:text="${sp.conBaoHanh}"></td>
                <td th:text="${sp.danhMuc.ten}"></td>
            </tr>
        </th:block>
        </tbody>
    </table>
</body>
</html>
