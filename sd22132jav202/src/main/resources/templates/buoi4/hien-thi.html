<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    Them sinh vien:
    <form action="/buoi4/them" method="post">
        id: <input type="text" name="id"> <br>
        ten: <input type="text" name="ten"> <br>
        diem: <input type="text" name="diem"> <br>
        gioi tinh:
            Nam <input type="radio" name="gioiTinh" value="true">
            Nu <input type="radio" name="gioiTinh" value="false">
        <br>
        <button>Them</button>
    </form>
    <br>
    Bang thong tin:
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Ten</th>
                <th>Diem</th>
                <th>Gioi tinh</th>
                <th>Hanh dong</th>
            </tr>
        </thead>
        <tbody>
            <th:block th:each="sv : ${listSinhVien}">
                <tr>
                    <td th:text="${sv.id}"></td>
                    <td th:text="${sv.ten}"></td>
                    <td th:text="${sv.diem}"></td>
                    <td th:text="${sv.gioiTinh == true ? 'Nam' : 'Nu'}"></td>
                    <td>
                        <a th:href="@{|/buoi4/view-update/${sv.id}|}">View update</a>
                        <a th:href="@{|/buoi4/xoa?id=${sv.id}|}">Xoa</a>
                    </td>
                </tr>
            </th:block>
        </tbody>
    </table>
</body>
</html>
