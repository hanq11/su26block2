<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    Thong tin:
    <p th:text="${username}"></p>
    <p th:text="${password}"></p>
    <p th:text="${remember == true ? 'Co nho' : 'Khong nho'}"></p>

    <p>Truyen object</p>
    <p>Truy cập thông tin object: [[${login.username}]]</p>
    <p>Truy cap su dung th:object</p>
    <ul th:object="${login}">
        <li th:text="*{username}"></li>
        <li th:text="*{password}"></li>
    </ul>

    <table>
        <thead>
            <tr>
                <th>username</th>
                <th>password</th>
                <th>remember</th>
            </tr>
        </thead>
        <tbody>
            <th:block th:each="tk : ${listTaiKhoan}">
                <tr>
                    <td th:text="${tk.username}"></td>
                    <td th:text="${tk.password}"></td>
                    <td th:text="${tk.remember}"></td>
                </tr>
            </th:block>
        </tbody>
    </table>

    <a th:href="@{|/buoi3/show-form|}">Tro ve login</a>

</body>
</html>
